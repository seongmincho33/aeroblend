[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:xvfb]
command=Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX
autorestart=true
priority=10

[program:x11vnc]
command=x11vnc -display :99 -forever -nopw -shared -rfbport 5900
autorestart=true
priority=20

[program:novnc]
command=websockify --web=/usr/share/novnc/ 6080 localhost:5900
autorestart=true
priority=30
